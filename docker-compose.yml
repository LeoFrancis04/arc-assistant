version: '3.8'

services:
  arc:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount local ./data so notes and memory survive container rebuilds
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
 